<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>My first three.js app</title>
  </head>
  <body>
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
      </script>
    <div class="app-container">
        <header class="glass-header">
            <div class="brand">
                <h1>Chair Configurator</h1>
                <p>Premium 3D Customizer</p>
            </div>
            <div class="author">By Nathalie</div>
        </header>
        
        <main id="canvas-container"></main>
        
        <footer class="controls">
            <div class="control-group">
                <span>Cushion Color:</span>
                <button class="color-btn red" data-group="fabric" data-color="#d82d2d"></button>
                <button class="color-btn blue" data-group="fabric" data-color="#35578a"></button>
                <button class="color-btn blue" data-group="fabric" data-color="#666666"></button>
            </div>
            <div class="control-group">
                <span>Cushion Material:</span>
                <button class="mat-btn fabric-preview" data-group="fabric" data-tex="fabric"></button>
                <button class="mat-btn fabric2-preview" data-group="fabric" data-tex="fabric2"></button>
            </div>

            <div class="control-group">
                <span>Leg Materials:</span>
                <button class="mat-btn metal-preview" data-group="legs" data-tex="metal"></button>
                <button class="mat-btn wood-preview" data-group="legs" data-tex="wood"></button>

            </div>
        </footer>
    </div>
    <script type="module" src=".e/main.js"></script>
  </body>
</html>
